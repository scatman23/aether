name: Continuous Deployment & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  release:
    name: Build, Sign, and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Bundle Application
        run: |
          git archive --format=tar.gz -o aether.tar.gz HEAD

      - name: Import GPG Key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Sign Release Archive
        run: |
          gpg --armor --detach-sign aether.tar.gz
          echo "SIGNED_ASSET=aether.tar.gz.asc" >> $GITHUB_ENV
          echo "ARCHIVE_ASSET=aether.tar.gz" >> $GITHUB_ENV

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            aether.tar.gz
            aether.tar.gz.asc
          draft: false
          prerelease: false
          generate_release_notes: true
