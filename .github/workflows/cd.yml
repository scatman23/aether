name: Continuous Deployment & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  release:
    name: Build, Sign, and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Python Dependencies & PyInstaller
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pyinstaller

      - name: Bundle Backend (PyInstaller)
        run: |
          pyinstaller --onefile --name aether-backend src/main.py
          mv dist/aether-backend src-frontend/

      - name: Install Node Dependencies & Package Frontend (Electron-Builder)
        working-directory: ./src-frontend
        run: |
          npm ci
          npx electron-builder --linux AppImage

      - name: Import GPG Key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Sign AppImage Binary
        run: |
          cd src-frontend/dist || exit 1
          # Assuming the generated file ends in .AppImage
          APPIMAGE=$(find . -name "*.AppImage" | head -n 1)
          gpg --armor --detach-sign "$APPIMAGE"
          echo "SIGNED_ASSET=$APPIMAGE.asc" >> $GITHUB_ENV
          echo "APPIMAGE_ASSET=$APPIMAGE" >> $GITHUB_ENV

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-frontend/dist/*.AppImage
            src-frontend/dist/*.AppImage.asc
          draft: false
          prerelease: false
          generate_release_notes: true
