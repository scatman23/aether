version: '3.8'

services:
  aether-backend:
    build: . 
    container_name: aether-backend
    ports:
      - "5000:5000"
    restart: unless-stopped
    volumes:
      - ./aether_data:/app/data:z

  aether-frontend:
    build: ./src-frontend
    container_name: aether-frontend
    ports:
      - "5173:5173"
    environment:
      - AETHER_API_PORT=5000
    depends_on:
      - aether-backend